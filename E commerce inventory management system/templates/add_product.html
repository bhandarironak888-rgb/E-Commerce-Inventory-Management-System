<!DOCTYPE html>
<html>

<head>

<title>Add Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Add Product</h2>

<form method="POST">

<input name="name" class="form-control mb-3" placeholder="Product Name" required>

<input name="category" class="form-control mb-3" placeholder="Category" required>

<input name="price" type="number" class="form-control mb-3" placeholder="Price" required>

<input name="quantity" type="number" class="form-control mb-3" placeholder="Quantity" required>

<button class="btn btn-success">Add Product</button>

</form>

</div>

</body>
</html>
